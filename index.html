<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doomscrollers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'CashMarket-BoldRounded';
      src: url('uploads/CashMarket-BoldRounded.ttf') format('truetype');
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .logo {
      width: 280px;
      height: auto;
      display: block;
    }

    .tagline {
      font-family: 'CashMarket-BoldRounded', monospace;
      font-size: 20px;
      font-weight: 700;
      color: #ff3300;
      text-align: center;
      line-height: 1.5;
      margin-top: 28px;
      letter-spacing: 0.01em;
    }

    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      margin-top: 72px;
    }

    .links a {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 400;
      color: #ff3300;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: opacity 0.15s ease;
    }

    .links a:hover {
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="uploads/doomscrollerslogo.png" alt="Doomscrollers">
    <p class="tagline">a privacy invading battle of<br>digital profiling</p>
    <nav class="links">
      <a href="#">download on iOS</a>
      <a href="#">download on Google Play</a>
      <a href="#">privacy policy &amp; terms</a>
      <a href="#">faq</a>
    </nav>
  </div>
</body>
</html>
